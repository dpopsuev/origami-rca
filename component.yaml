apiVersion: origami/v1
kind: Schematic
metadata:
  name: origami-rca
  module: github.com/dpopsuev/origami-rca
  namespace: rca
  description: "Red Hat Root Cause Analysis — CI failure investigation circuit"
spec:
  version: "1.0.0"
  session_factory: "Factory()"
  resolver: SchematicResolver
  provides:
    transformers: [context-builder, prompt-filler]
    extractors: [recall, triage, resolve, investigate, correlate, review, report]
    hooks: [store.recall, store.triage, store.investigate, store.correlate, store.review]
  needs:
    sources:
      - name: source
        type: SourceReader
        description: Reads test failure data from an external tracker (via Extra params at runtime)
        optional: true
      - name: discoverer
        type: RunDiscoverer
        description: Discovers available CI runs and their failures
        optional: true
    storage:
      - name: store
        type: store.Store
        description: Persistent storage backend (built-in SQLite default)
        optional: true
      - name: writer
        type: DefectWriter
        description: Writes RCA results back to the external tracker
        optional: true
